services:
  - type: web
    name: carter-digital-solutions
    runtime: python
    plan: starter
    buildCommand: cd frontend && npm ci && npm run build && cd .. && pip install -r backend/requirements.txt
    startCommand: gunicorn backend.wsgi:app
    healthCheckPath: /api/ready
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: FORCE_HTTPS
        value: "1"
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: carter_digital_solutions
      - key: MONGODB_ENQUIRY_COLLECTION
        value: enquiries
      - key: MONGODB_ADMIN_COLLECTION
        value: admin_users
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
